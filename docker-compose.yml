name: insightops

services:
  insightops:
    build:
      context: .
      args:
        NEXT_PUBLIC_DATA_SOURCE: api
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:?PUBLIC_API_BASE_URL must be set}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    image: insightops-api:production
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    environment:
      DATABASE_URL_FILE: /run/secrets/app_database_url
      API_HOST: 0.0.0.0
      API_PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set}
    secrets:
      - app_database_url
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health/live').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  api-migrate:
    image: insightops-api-migration:production
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migration
    environment:
      MIGRATION_DATABASE_URL_FILE: /run/secrets/migration_database_url
      APP_DATABASE_ROLE: ${POSTGRES_APP_USER:?POSTGRES_APP_USER must be set}
    secrets:
      - migration_database_url
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: "no"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:?POSTGRES_ADMIN_USER must be set}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_admin_password
      POSTGRES_MIGRATOR_USER: ${POSTGRES_MIGRATOR_USER:?POSTGRES_MIGRATOR_USER must be set}
      POSTGRES_MIGRATOR_PASSWORD_FILE: /run/secrets/postgres_migrator_password
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:?POSTGRES_APP_USER must be set}
      POSTGRES_APP_PASSWORD_FILE: /run/secrets/postgres_app_password
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    secrets:
      - postgres_admin_password
      - postgres_migrator_password
      - postgres_app_password
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-roles.sh:/docker-entrypoint-initdb.d/10-init-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:

secrets:
  app_database_url:
    file: ${APP_DATABASE_URL_SECRET_FILE:?APP_DATABASE_URL_SECRET_FILE must point to a secret file}
  migration_database_url:
    file: ${MIGRATION_DATABASE_URL_SECRET_FILE:?MIGRATION_DATABASE_URL_SECRET_FILE must point to a secret file}
  postgres_admin_password:
    file: ${POSTGRES_ADMIN_PASSWORD_SECRET_FILE:?POSTGRES_ADMIN_PASSWORD_SECRET_FILE must point to a secret file}
  postgres_migrator_password:
    file: ${POSTGRES_MIGRATOR_PASSWORD_SECRET_FILE:?POSTGRES_MIGRATOR_PASSWORD_SECRET_FILE must point to a secret file}
  postgres_app_password:
    file: ${POSTGRES_APP_PASSWORD_SECRET_FILE:?POSTGRES_APP_PASSWORD_SECRET_FILE must point to a secret file}
